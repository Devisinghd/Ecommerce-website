{% extends 'myapp/base.html' %}

{% block title %}Logged out · ShopFusion{% endblock %}
{% block body %}
<section class="auth-shell">
  <div class="auth-inner">
    <div class="auth-panel">
      <div class="auth-card" style="max-width: 720px; margin: 0 auto; text-align: center;">
        <span class="auth-badge" style="background: rgba(244,114,182,0.12); color: #be185d;">Signed out</span>
        <h1 class="auth-title">You’re safely logged out</h1>
        <p class="auth-copy">Your session has ended. You can log in again anytime or continue browsing products on ShopFusion.</p>

        <div class="auth-success-actions">
          <a href="{% url 'login' %}" class="btn-primary">Sign in again</a>
          <a href="{% url 'index' %}" class="btn-outline auth-secondary-button">Continue shopping</a>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
