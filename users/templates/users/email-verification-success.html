{% extends 'myapp/base.html' %}

{% block body %}
<div class="min-h-screen bg-slate-50 px-4 py-10">
  <div class="mx-auto max-w-3xl rounded-3xl bg-white p-8 shadow-lg shadow-slate-200/70 sm:p-10">
    <div class="flex flex-col gap-6 text-center">
      <span class="inline-flex items-center justify-center rounded-full bg-emerald-100 px-4 py-2 text-sm font-semibold text-emerald-700">
        Verified
      </span>
      <h1 class="text-3xl font-semibold tracking-tight text-slate-900 sm:text-4xl">
        Your email is now verified
      </h1>
      <p class="mx-auto max-w-xl text-base leading-7 text-slate-600">
        Your account has been activated successfully. You can now sign in and start shopping with ShopMate.
      </p>
      <a href="/" class="mx-auto inline-flex rounded-full bg-blue-600 px-6 py-3 text-sm font-semibold text-white shadow-sm shadow-blue-600/20 hover:bg-blue-700">
        Continue to Home
      </a>
    </div>
  </div>
</div>
{% endblock %}
