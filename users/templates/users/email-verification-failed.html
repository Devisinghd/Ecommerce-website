{% extends 'myapp/base.html' %}

{% block body %}
<div class="min-h-screen bg-slate-50 px-4 py-10">
  <div class="mx-auto max-w-3xl rounded-3xl bg-white p-8 shadow-lg shadow-slate-200/70 sm:p-10">
    <div class="flex flex-col gap-6 text-center">
      <span class="inline-flex items-center justify-center rounded-full bg-rose-100 px-4 py-2 text-sm font-semibold text-rose-700">
        Verification failed
      </span>
      <h1 class="text-3xl font-semibold tracking-tight text-slate-900 sm:text-4xl">
        We couldn't verify your email
      </h1>
      <p class="mx-auto max-w-xl text-base leading-7 text-slate-600">
        The verification link is invalid, expired, or already used. Please try registering again or request a new verification email.
      </p>
      <a href="/users/register/" class="mx-auto inline-flex rounded-full bg-blue-600 px-6 py-3 text-sm font-semibold text-white shadow-sm shadow-blue-600/20 hover:bg-blue-700">
        Register again
      </a>
    </div>
  </div>
</div>
{% endblock %}
