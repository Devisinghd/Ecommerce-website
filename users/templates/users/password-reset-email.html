<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset your ShopFusion password</title>
  </head>
  <body style="margin:0; font-family:Arial, sans-serif; background:#f8fafc; color:#111827;">
    <table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="max-width:680px; margin:0 auto;">
      <tr>
        <td style="padding:40px 16px;">
          <table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="background:#ffffff; border-radius:24px; box-shadow:0 24px 40px rgba(15,23,42,0.08);">
            <tr>
              <td style="padding:40px; text-align:center;">
                <h1 style="margin:0 0 16px; font-size:28px;">Reset your password</h1>
                <p style="margin:0 0 24px; color:#475569; font-size:16px; line-height:1.75;">Use the link below to choose a new password for your ShopFusion account.</p>
                <a href="{{ protocol }}://{{ domain }}{% url 'password_reset_confirm' uidb64=uid token=token %}" style="display:inline-block; padding:14px 24px; border-radius:999px; background:#2563eb; color:#fff; text-decoration:none; font-weight:700;">Reset password</a>
              </td>
            </tr>
            <tr>
              <td style="padding:0 40px 40px; color:#64748b; font-size:14px; line-height:1.7;">
                <p>If you did not request this password reset, no further action is required.</p>
                <p>Thanks,<br>The ShopFusion Team</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
