{% extends 'myapp/base.html' %}

{% block body %}
<div class="min-h-screen bg-slate-50 px-4 py-12">
  <div class="mx-auto max-w-2xl overflow-hidden rounded-[28px] bg-white p-8 shadow-xl shadow-slate-200/70 sm:p-10">
    <div class="text-center">
      <span class="inline-flex items-center rounded-full bg-emerald-100 px-4 py-2 text-sm font-semibold text-emerald-700">All set</span>
      <h1 class="mt-6 text-4xl font-semibold text-slate-900">Your password has been reset</h1>
      <p class="mx-auto mt-4 max-w-xl text-base leading-7 text-slate-600">Your password was changed successfully. You can now sign in with your new credentials.</p>
      <a href="{% url 'login' %}" class="mt-8 inline-flex rounded-2xl bg-blue-600 px-6 py-3 text-base font-semibold text-white shadow-lg shadow-blue-500/20 hover:bg-blue-700">Go to login</a>
    </div>
  </div>
</div>
{% endblock %}
