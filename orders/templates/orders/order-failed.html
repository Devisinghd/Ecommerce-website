{% extends 'myapp/base.html' %}
{% block title %}Order Failed · ShopMate{% endblock %}
{% block body %}
<div class="min-h-screen bg-slate-50 px-4 py-12">
  <div class="mx-auto max-w-3xl rounded-[32px] border border-slate-200 bg-white p-10 shadow-sm shadow-slate-200/50 text-center">
    <div class="inline-flex h-16 w-16 items-center justify-center rounded-full bg-rose-100 text-3xl text-rose-700">✕</div>
    <h1 class="mt-6 text-4xl font-semibold text-slate-900">Order could not be placed</h1>
    <p class="mt-4 text-base leading-7 text-slate-600">Something went wrong while processing your order. Please try again or contact support if the issue persists.</p>
    <a href="{% url 'checkout' %}" class="mt-8 inline-flex rounded-full bg-rose-600 px-6 py-3 text-base font-semibold text-white shadow-lg shadow-rose-500/20 transition hover:bg-rose-700">Retry checkout</a>
  </div>
</div>
{% endblock %}
