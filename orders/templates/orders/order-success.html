{% extends 'myapp/base.html' %}
{% block title %}Order Confirmed · ShopMate{% endblock %}
{% block body %}
<div class="min-h-screen bg-slate-50 px-4 py-12">
  <div class="mx-auto max-w-3xl rounded-[32px] border border-slate-200 bg-white p-10 shadow-sm shadow-slate-200/50 text-center">
    <div class="inline-flex h-16 w-16 items-center justify-center rounded-full bg-emerald-100 text-3xl text-emerald-700">✓</div>
    <h1 class="mt-6 text-4xl font-semibold text-slate-900">Order placed successfully</h1>
    <p class="mt-4 text-base leading-7 text-slate-600">Thank you for your purchase! We are preparing your order and will notify you when it is on the way.</p>
    <a href="{% url 'index' %}" class="mt-8 inline-flex rounded-full bg-blue-600 px-6 py-3 text-base font-semibold text-white shadow-lg shadow-blue-500/20 transition hover:bg-blue-700">Continue shopping</a>
  </div>
</div>
{% endblock %}
