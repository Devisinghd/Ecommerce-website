<form action="" method="post" enctype="multipart/form-data">
    {% csrf_token %}
    Product name: {{ form.name }}
    Description: {{ form.description }}
    Price: {{ form.price }}
    Stock: {{ form.stock }}
    Image: {{ form.image }}
    Is Active: {{ form.is_active }}
    <button type="submit">Create Product</button>
</form>
