{% extends 'myapp/base.html' %}

{% block body %}
<div class="page-shell">
  <div class="panel detail-panel" style="overflow:hidden;">
    <div class="detail-media">
      <img src="{{ product.image.url }}" alt="{{ product.name }}" />
    </div>
    <div style="padding:24px;">
      <div class="section-head" style="margin-bottom:16px; align-items:flex-start;">
        <div>
          <p class="badge">Product details</p>
          <h2 style="margin-top:10px;">{{ product.name }}</h2>
        </div>
        <div class="nav-actions" style="flex-wrap:wrap;">
          <a href="{% url 'seller-product-update' product.slug %}" class="btn-primary">Update</a>
          <a href="{% url 'seller-product-delete' product.slug %}" class="btn-outline" style="border-color:#fecaca; color:#b91c1c;">Delete</a>
        </div>
      </div>
      <div class="detail-grid">
        <div class="summary-card">
          <p style="font-weight:700; color:var(--text);">Description</p>
          <p style="margin-top:8px; color:var(--muted); line-height:1.8;">{{ product.description }}</p>
        </div>
        <div class="summary-card">
          <div class="stat-row"><span>Price</span><strong style="color:var(--text);">₹{{ product.price }}</strong></div>
          <div class="stat-row"><span>Stock</span><strong style="color:var(--text);">{{ product.stock }}</strong></div>
          <div class="stat-row"><span>Visibility</span><strong style="color:var(--success);">Live</strong></div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
