{% extends 'myapp/base.html' %}

{% block body %}
<div class="mx-auto max-w-5xl px-4 py-10 sm:px-6 lg:px-8">
  <div class="overflow-hidden rounded-[32px] border border-slate-200 bg-white shadow-sm">
    <img src="{{ product.image.url }}" alt="{{ product.name }}" class="h-72 w-full object-cover" />
    <div class="p-8">
      <div class="flex flex-wrap items-start justify-between gap-4">
        <div>
          <p class="text-sm font-semibold uppercase tracking-[0.3em] text-blue-600">Product details</p>
          <h1 class="mt-2 text-3xl font-semibold text-slate-900">{{ product.name }}</h1>
        </div>
        <div class="flex gap-3">
          <a href="{% url 'seller-product-update' product.slug %}" class="rounded-full bg-blue-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-blue-700">Update</a>
          <a href="{% url 'seller-product-delete' product.slug %}" class="rounded-full bg-rose-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-rose-700">Delete</a>
        </div>
      </div>
      <div class="mt-6 grid gap-6 md:grid-cols-2">
        <div class="rounded-3xl bg-slate-50 p-5">
          <p class="text-sm font-semibold text-slate-600">Description</p>
          <p class="mt-2 text-sm leading-7 text-slate-700">{{ product.description }}</p>
        </div>
        <div class="space-y-4 rounded-3xl bg-slate-50 p-5">
          <div class="flex items-center justify-between text-sm text-slate-600">
            <span>Price</span>
            <span class="text-lg font-semibold text-slate-900">₹{{ product.price }}</span>
          </div>
          <div class="flex items-center justify-between text-sm text-slate-600">
            <span>Stock</span>
            <span class="text-lg font-semibold text-slate-900">{{ product.stock }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
